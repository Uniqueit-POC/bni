<header id="topbar" class="fixed top-0 left-0 right-0 z-50 dark:bg-zinc-950 bg-white border-b dark:border-zinc-800 border-gray-200 h-14 flex items-center justify-between px-5 shadow-md">
  <div class="flex items-center gap-3">
    <div class="bg-brand-red px-2 py-1 flex items-center">
      <span class="font-display text-white text-xl tracking-wider">BNI</span>
    </div>
    <div class="hidden sm:block">
      <div class="font-display text-lg tracking-widest dark:text-white text-gray-900">GAINS SHEET BUILDER</div>
      <div class="text-xs dark:text-zinc-400 text-gray-500 tracking-widest uppercase">Fill the form → Preview → Download PDF</div>
    </div>
  </div>
  <div class="flex items-center gap-3">
    <!-- Theme Toggle -->
    <button (click)="toggleTheme.emit()" class="flex items-center gap-2 px-3 py-1.5 rounded border dark:border-zinc-600 border-gray-300 text-sm dark:text-zinc-300 text-gray-600 hover:border-brand-red transition-colors">
      <svg *ngIf="theme === 'light'" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
      <svg *ngIf="theme === 'dark'" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
      <span class="hidden sm:inline">{{ theme === 'dark' ? 'Light Mode' : 'Dark Mode' }}</span>
    </button>
    <!-- Mobile preview toggle -->
    <button (click)="toggleMobilePreview.emit()" class="lg:hidden px-3 py-1.5 bg-zinc-700 text-white text-sm rounded" id="preview-toggle-btn">Preview</button>
    <!-- Download PDF -->
    <button (click)="downloadPdf.emit()" class="bg-brand-red hover:bg-red-700 text-white font-semibold text-sm px-4 py-2 flex items-center gap-2 transition-colors rounded">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
      <span class="hidden sm:inline">DOWNLOAD PDF</span>
      <span class="sm:hidden">PDF</span>
    </button>
  </div>
</header>
